# Belt Printer profiles for PrusAngleSlicer
# Cartesian belt printers with infinite Y axis
#
# These printers have a conveyor belt on the Y axis, allowing:
# - Continuous part ejection (print, eject, repeat)
# - Parts longer than the bed in the Y direction
# - Angled slicing to print parts bigger than X or Z limits

[vendor]
name = Belt Printer (Generic)
config_version = 0.0.1
config_update_url = 

# ============================================================
# Common printer settings
# ============================================================

[printer:*belt_common*]
printer_technology = FFF
# Bed shape: 200mm X, 10000mm Y (effectively infinite)
# The large Y ensures no out-of-bounds warnings for belt-direction parts
bed_shape = 0x0,200x0,200x10000,0x10000
max_print_height = 200
gcode_flavor = marlin
silent_mode = 0
remaining_times = 1
use_relative_e_distances = 1
# Machine limits
machine_max_acceleration_e = 5000
machine_max_acceleration_extruding = 1500
machine_max_acceleration_retracting = 1500
machine_max_acceleration_x = 3000
machine_max_acceleration_y = 1000
machine_max_acceleration_z = 500
machine_max_feedrate_e = 80
machine_max_feedrate_x = 300
machine_max_feedrate_y = 100
machine_max_feedrate_z = 12
machine_max_jerk_e = 5
machine_max_jerk_x = 10
machine_max_jerk_y = 5
machine_max_jerk_z = 0.4
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
# Extruder
nozzle_diameter = 0.4
extruder_offset = 0x0
retract_before_travel = 2
retract_before_wipe = 0%
retract_layer_change = 0
retract_length = 1.0
retract_lift = 0.2
retract_speed = 40
deretract_speed = 30
wipe = 0
# Start G-code: home X and Z only (Y is belt, no endstop)
start_gcode = ; Belt Printer Start\nG28 X Z ; Home X and Z only\nG92 Y0 ; Set current Y as zero (belt position)\nG1 Z5 F1000 ; Lift nozzle\nG1 X{first_layer_center_no_wipe_tower[0]} F3000 ; Move to center X\nM104 S[first_layer_temperature] ; Set extruder temp\nM140 S[first_layer_bed_temperature] ; Set bed temp\nM190 S[first_layer_bed_temperature] ; Wait for bed\nM109 S[first_layer_temperature] ; Wait for extruder\nG1 Z0.3 F1000 ; Lower to first layer height\nG92 E0 ; Reset extruder\n; Ready to print
# End G-code: retract, lift, advance belt to eject part
end_gcode = ; Belt Printer End - Eject Part\nG92 E0\nG1 E-3 F2400 ; Retract\nG1 Z{min(max_layer_z + 10, max_print_height)} F1000 ; Lift nozzle\nM104 S0 ; Extruder off\n; Advance belt to eject part\nG1 Y{max_layer_z + 100} F1000 ; Belt advance: part length + 100mm clearance\nG92 Y0 ; Reset Y origin for next part\nG4 S5 ; Pause 5s for part to detach\nM140 S0 ; Bed off\nM84 ; Motors off\n; Part ejected, ready for next print
# Between-objects G-code for sequential printing
between_objects_gcode = ; Eject current part, prepare for next\nG92 E0\nG1 E-3 F2400 ; Retract\nG1 Z{min(max_layer_z + 10, max_print_height)} F1000 ; Lift\nG1 Y{max_layer_z + 50} F1000 ; Belt advance to eject\nG92 Y0 ; Reset Y for next part\nG4 S3 ; Brief pause\nG1 Z0.3 F1000 ; Lower for next part\nG1 E3 F2400 ; Unretract

# ============================================================
# Belt Printer 200x200 (200mm X, 200mm Z, infinite Y)
# ============================================================

[printer:Belt Printer 200x200]
inherits = *belt_common*
printer_model = BeltPrinter200
printer_variant = 0.4
bed_shape = 0x0,200x0,200x10000,0x10000
max_print_height = 200
nozzle_diameter = 0.4

# ============================================================
# Belt Printer 300x200 (300mm X, 200mm Z, infinite Y)
# ============================================================

[printer:Belt Printer 300x200]
inherits = *belt_common*
printer_model = BeltPrinter300
printer_variant = 0.4
bed_shape = 0x0,300x0,300x10000,0x10000
max_print_height = 200
nozzle_diameter = 0.4
machine_max_feedrate_x = 400

# ============================================================
# Belt Printer 200x200 (0.6mm nozzle variant)
# ============================================================

[printer:Belt Printer 200x200 0.6mm]
inherits = *belt_common*
printer_model = BeltPrinter200
printer_variant = 0.6
bed_shape = 0x0,200x0,200x10000,0x10000
max_print_height = 200
nozzle_diameter = 0.6

# ============================================================
# Print profiles optimized for belt printing
# ============================================================

[print:*belt_print_common*]
layer_height = 0.3
first_layer_height = 0.35
perimeters = 2
fill_density = 15%
fill_pattern = rectilinear
support_material = 0
skirts = 0
brim_width = 0
# Angled slicing defaults (user can override)
angled_slicing_angle = 0
angled_slicing_direction = 90

[print:Belt - Normal Quality]
inherits = *belt_print_common*
layer_height = 0.2
perimeters = 3
fill_density = 20%

[print:Belt - Fast Draft]
inherits = *belt_print_common*
layer_height = 0.3
perimeters = 2
fill_density = 10%
infill_speed = 80
perimeter_speed = 60

[print:Belt - Angled 15deg]
inherits = *belt_print_common*
layer_height = 0.2
angled_slicing_angle = 15
angled_slicing_direction = 90
perimeters = 3
fill_density = 20%

[print:Belt - Angled 30deg]
inherits = *belt_print_common*
layer_height = 0.2
angled_slicing_angle = 30
angled_slicing_direction = 90
perimeters = 3
fill_density = 20%

[print:Belt - Angled 45deg (Max Length)]
inherits = *belt_print_common*
layer_height = 0.2
angled_slicing_angle = 45
angled_slicing_direction = 90
perimeters = 3
fill_density = 25%

# ============================================================
# Filament profile (generic PLA for belt printer)
# ============================================================

[filament:Belt - Generic PLA]
filament_type = PLA
temperature = 210
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 65
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100
bridge_fan_speed = 100
filament_colour = #FFFFFF
